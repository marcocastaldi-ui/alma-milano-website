<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — ALMA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-hero {
      background: var(--bg-deep);
      padding: 3.5rem 1.5rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid var(--panel-light);
    }
    .page-hero .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .page-hero h1 {
      font-family: 'Cambria', serif;
      font-size: clamp(2rem, 5vw, 3rem);
    }
    .page-hero p {
      color: var(--text-dim);
      margin-top: 0.75rem;
    }

    /* ── List ── */
    .archive-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }

    .archive-item {
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .archive-item:hover { border-color: var(--accent); }

    .archive-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.3rem;
      gap: 1rem;
      cursor: pointer;
    }

    .archive-meta { flex: 1; }

    .archive-date {
      font-family: 'Cambria', serif;
      font-size: 1rem;
      color: var(--text);
      font-weight: 700;
    }

    .archive-preview {
      font-size: 0.83rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 560px;
    }

    .archive-play {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .archive-play:hover { opacity: 0.8; }

    /* Expandable video panel */
    .archive-video {
      display: none;
      padding: 0 1.3rem 1.3rem;
    }

    .archive-video.open { display: block; }

    .archive-video video {
      width: 100%;
      border-radius: 6px;
      background: #000;
      max-height: 400px;
    }

    .archive-speech {
      margin-top: 1rem;
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.7;
      white-space: pre-line;
      border-top: 1px solid var(--panel-light);
      padding-top: 1rem;
    }

    /* count badge */
    .count-badge {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      background: rgba(217,119,87,0.12);
      color: var(--accent);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">A.L.M.A.</a>
  <ul class="nav-links">
    <li><a href="how-it-works.html">How</a></li>
    <li><a href="today.html">Today</a></li>
    <li><a href="archive.html" class="active">Archive</a></li>
    <li><a href="why.html">Why</a></li>
  </ul>
</nav>

<main>

  <div class="page-hero">
    <p class="eyebrow">All briefings</p>
    <h1>Archive</h1>
    <p>Every ALMA briefing, most recent first.</p>
    <span class="count-badge" id="count-badge">Loading…</span>
  </div>

  <section class="section">
    <div class="container">

      <div id="loading" class="state-msg">Loading archive…</div>
      <div id="error" class="state-msg" style="display:none; color: var(--accent);">
        No briefings found yet.
      </div>

      <div class="archive-list" id="archive-list"></div>

    </div>
  </section>

</main>

<footer>
  <p>ALMA · AI Local Milan Advisor · EssilorLuxottica Performance Team · 2026</p>
</footer>

<script src="supabase.js"></script>
<script>
  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function truncate(text, n = 120) {
    if (!text) return '';
    return text.length > n ? text.slice(0, n) + '…' : text;
  }

  function toggleVideo(item) {
    const panel = item.querySelector('.archive-video');
    const btn   = item.querySelector('.archive-play');
    const video = panel.querySelector('video');
    const isOpen = panel.classList.toggle('open');
    btn.textContent = isOpen ? 'Close ✕' : '▶ Play';
    if (isOpen) { video.play(); }
    else { video.pause(); video.currentTime = 0; }
  }

  async function init() {
    try {
      const entries = await getAllVideos();
      document.getElementById('loading').style.display = 'none';

      if (!entries || entries.length === 0) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('count-badge').textContent = '0 briefings';
        return;
      }

      document.getElementById('count-badge').textContent = `${entries.length} briefing${entries.length !== 1 ? 's' : ''}`;

      const list = document.getElementById('archive-list');

      entries.forEach(entry => {
        const item = document.createElement('div');
        item.className = 'archive-item';
        item.innerHTML = `
          <div class="archive-header">
            <div class="archive-meta">
              <div class="archive-date">${formatDate(entry.speech_date)}</div>
              <div class="archive-preview">${truncate(entry.speech_text)}</div>
            </div>
            <button class="archive-play">▶ Play</button>
          </div>
          <div class="archive-video">
            <video controls preload="none" playsinline>
              <source src="${entry.video_url}" type="video/mp4" />
            </video>
            <div class="archive-speech">${entry.speech_text ?? ''}</div>
          </div>
        `;

        item.querySelector('.archive-header').addEventListener('click', () => toggleVideo(item));
        list.appendChild(item);
      });

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      console.error(e);
    }
  }

  init();
</script>

</body>
</html>
